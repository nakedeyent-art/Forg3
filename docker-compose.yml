# Self-hosted Forg3 Sign: API + web client + Postgres.
# 1. Copy .env.example to .env and fill in the production values
#    (APP_AUTH_SECRET, DEVICE_TRUST_SECRET, FORG3_OBJECT_ENCRYPTION_KEY,
#    EMAIL_PROVIDER credentials, PUBLIC_SIGNING_BASE_URL).
# 2. docker compose up --build -d
services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: forg3
      POSTGRES_USER: forg3
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - forg3-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forg3 -d forg3"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://forg3:${POSTGRES_PASSWORD}@db:5432/forg3
      DATABASE_SSL: disable
    ports:
      - "${PORT:-4127}:4127"

volumes:
  forg3-db:
