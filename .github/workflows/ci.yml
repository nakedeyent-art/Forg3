name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (app)
        run: npx tsc -p tsconfig.app.json --noEmit

      - name: Typecheck (server)
        run: npx tsc -p tsconfig.server.json --noEmit

      - name: Build web + server
        run: npm run build

      - name: Backend smoke tests (file store)
        run: npm run smoke

      - name: Dependency audit (high severity)
        run: npm audit --audit-level=high --omit=dev

  smoke-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: forg3_ci
          POSTGRES_USER: forg3
          POSTGRES_PASSWORD: forg3_ci_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U forg3 -d forg3_ci"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build server
        run: npx tsc -p tsconfig.server.json

      - name: Backend smoke tests (Postgres store)
        run: npm run smoke
        env:
          DATABASE_URL: postgres://forg3:forg3_ci_password@127.0.0.1:5432/forg3_ci
          DATABASE_SSL: disable

  docker-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build production image
        run: docker build -t forg3-sign:ci .

  publish-ghcr:
    runs-on: ubuntu-latest
    needs: [build-and-test, smoke-postgres, docker-image]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Build and publish production image
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            -t ghcr.io/nakedeyent-art/forg3:main \
            -t ghcr.io/nakedeyent-art/forg3:${{ github.sha }} \
            --push \
            .
